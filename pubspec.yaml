name: cablebee_assistant
description: CableBee ADB Assistant - Control Android devices from your phone
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  # State management
  provider: ^6.1.1
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  # File
  file_picker: ^6.1.1
  # Network
  network_info_plus: ^5.0.3
  # Permissions
  permission_handler: ^11.3.0
  # Utils
  intl: ^0.19.0
  archive: ^3.4.10
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/bee_logo.png
    - assets/pkgserver.apk
    - assets/scrcpy-server
