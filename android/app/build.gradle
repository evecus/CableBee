plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keyPropertiesFile = rootProject.file('key.properties')
def keyProperties = new Properties()
if (keyPropertiesFile.exists()) {
    keyProperties.load(new FileInputStream(keyPropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) { flutterVersionCode = '1' }

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) { flutterVersionName = '1.0' }

android {
    namespace "com.cablebee.assistant"
    compileSdk 34
    ndkVersion "26.1.10909125"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'

        // adb/fastboot 二进制伪装成 .so 放入 jniLibs，
        // ABI splits 会自动只打包对应架构的文件，不再需要 Flutter assets。
        // 目录结构：
        //   android/app/src/main/jniLibs/arm64-v8a/libadb.so
        //   android/app/src/main/jniLibs/arm64-v8a/libfastboot.so
        //   android/app/src/main/jniLibs/armeabi-v7a/libadb.so
        //   android/app/src/main/jniLibs/armeabi-v7a/libfastboot.so
        main.jniLibs.srcDirs = ['src/main/jniLibs']
    }

    defaultConfig {
        applicationId "com.cablebee.assistant"
        minSdk 26
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            if (keyPropertiesFile.exists()) {
                keyAlias        keyProperties['keyAlias']
                keyPassword     keyProperties['keyPassword']
                storeFile       file(keyProperties['storeFile'])
                storePassword   keyProperties['storePassword']
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
        }
        release {
            signingConfig keyPropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'
        }
    }

    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a'
            universalApk false
        }
    }

    packagingOptions {
        // 保留 .so 文件不压缩，运行时可以直接用 nativeLibraryDir 路径执行
        jniLibs {
            useLegacyPackaging true   // 不压缩 .so，保证文件可以直接 chmod+exec
        }
        doNotStrip "**/libcablebee_adb.so"
        doNotStrip "**/libcablebee_fastboot.so"
    }

    lint {
        disable 'InvalidPackage'
        checkReleaseBuilds false
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.multidex:multidex:2.0.1'
}
