name: Build CableBee APK

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java ──────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # ── Flutter ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      # ── Dependencies ──────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Code quality ──────────────────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── Build version string ───────────────────────────────────────
      - name: Compute version name
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev+$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      # ── Keystore (release only) ────────────────────────────────────
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Write key.properties
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF

      # ── Build APKs ────────────────────────────────────────────────
      - name: Build arm64 APK
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --build-name="${{ steps.version.outputs.version }}" \
            --build-number="${{ github.run_number }}" \
            --dart-define=APP_VERSION="${{ steps.version.outputs.version }}" || true

          BUILD_DIR="build/app/outputs/flutter-apk"
          if ls "$BUILD_DIR"/app-*-release.apk 1>/dev/null 2>&1; then
            echo "APK found, build succeeded."
          else
            echo "ERROR: No APK found." && exit 1
          fi

      # ── Rename artifacts ──────────────────────────────────────────
      - name: Rename APK files
        run: |
          VER="${{ steps.version.outputs.version }}"
          BUILD_DIR="build/app/outputs/flutter-apk"
          
          # 使用通配符匹配任何以 app- 开头并以 -release.apk 结尾的文件
          for apk in "$BUILD_DIR"/app-*-release.apk; do
            if [ -f "$apk" ]; then
              # 提取架构信息 (例如从 app-arm64-v8a-release.apk 提取 arm64-v8a)
              ARCH=$(basename "$apk" | sed 's/app-//;s/-release.apk//')
              mv "$apk" "$BUILD_DIR/CableBee-${VER}-${ARCH}.apk"
            fi
          done

          # 同时也兼容处理默认的不带架构的文件名
          [ -f "$BUILD_DIR/app-release.apk" ] && \
            mv "$BUILD_DIR/app-release.apk" "$BUILD_DIR/CableBee-${VER}.apk"

          echo "=== Output APKs ==="
          ls -lh "$BUILD_DIR/"*.apk

      # ── Upload artifacts ──────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CableBee-${{ steps.version.outputs.version }}-apks
          path: build/app/outputs/flutter-apk/CableBee-*.apk
          retention-days: 30
          if-no-files-found: warn

      # ── GitHub Release (tag only) ─────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: CableBee v${{ steps.version.outputs.version }}
          body: |
            ## CableBee ADB Assistant v${{ steps.version.outputs.version }}

            ### Downloads
            | File | Architecture | Notes |
            |------|-------------|-------|
            | `CableBee-*-arm64.apk` | arm64-v8a | 适用于所有现代 Android 设备 |

            ### What's New
            <!-- Add release notes here -->

            ### Requirements
            - Android 8.0+ (API 26)
            - USB OTG support for USB mode
            - Wireless Debugging enabled on target device for Wi-Fi mode

            ---
            Built from commit `${{ github.sha }}` · Run #${{ github.run_number }}
          files: |
            build/app/outputs/flutter-apk/CableBee-*.apk
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Separate job: build summary ────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## CableBee Build Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch/Tag | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build status | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
