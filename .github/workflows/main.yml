name: Build & Release CableBee APK

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java ──────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # ── Flutter ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # ── Dependencies ──────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Build version & Tag ───────────────────────────────────────
      - name: Compute version and tag
        id: vars
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M')
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG_NAME="v${VERSION}"
          else
            VERSION="0.0.0-dev.${TIMESTAMP}"
            TAG_NAME="build-${TIMESTAMP}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"

      # ── Keystore (Optional: only if secrets exist) ─────────────────
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Write key.properties
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF

      # ── Build APKs ────────────────────────────────────────────────
      - name: Build split APKs
        run: |
          flutter build apk --release \
            --split-per-abi \
            --build-name="${{ steps.vars.outputs.version }}" \
            --build-number="${{ github.run_number }}" \
            --dart-define=APP_VERSION="${{ steps.vars.outputs.version }}" || true

          BUILD_DIR="build/app/outputs/flutter-apk"
          if ls "$BUILD_DIR"/app-*-release.apk 1>/dev/null 2>&1; then
            echo "APKs generated successfully."
          else
            echo "ERROR: No APKs found." && exit 1
          fi

      # ── Rename artifacts ──────────────────────────────────────────
      - name: Rename APK files
        run: |
          VER="${{ steps.vars.outputs.version }}"
          BUILD_DIR="build/app/outputs/flutter-apk"

          [ -f "$BUILD_DIR/app-arm64-v8a-release.apk" ] && \
            mv "$BUILD_DIR/app-arm64-v8a-release.apk" "$BUILD_DIR/CableBee-${VER}-arm64.apk"

          [ -f "$BUILD_DIR/app-armeabi-v7a-release.apk" ] && \
            mv "$BUILD_DIR/app-armeabi-v7a-release.apk" "$BUILD_DIR/CableBee-${VER}-armeabi.apk"

      # ── GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: CableBee Build ${{ steps.vars.outputs.timestamp }}
          body: |
            ## CableBee ADB Assistant
            自动构建版本：`${{ steps.vars.outputs.version }}`
            构建分支：`${{ github.ref_name }}`
            提交哈希：`${{ github.sha }}`

            ### 架构说明
            - **arm64.apk**: 适用于现代 64 位安卓设备（推荐）。
            - **armeabi.apk**: 适用于旧款 32 位安卓设备。
          files: |
            build/app/outputs/flutter-apk/CableBee-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Separate job: summary ─────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## CableBee Build Result" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Tag | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
