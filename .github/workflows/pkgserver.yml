name: pkgserver

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile Java → DEX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java 17 供 sdkmanager 使用，编译时仍用 -source 8 -target 8 ──────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'                   # 修复③：sdkmanager 16.0 需要 JDK 17+

      # ── Android SDK build-tools for d8 ───────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true
          packages: tools platform-tools

      - name: Install build-tools 33.0.0
        run: |
          sdkmanager "build-tools;33.0.0" "platforms;android-33"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      # ── Compile ───────────────────────────────────────────────────────────
      - name: Compile Java sources
        run: |
          SRC=src                              # 修复④：路径改为实际的 src/
          OUT=out
          CLASS_DIR=$OUT/classes
          ANDROID_JAR=$ANDROID_HOME/platforms/android-33/android.jar
          D8=$ANDROID_HOME/build-tools/33.0.0/d8

          mkdir -p $CLASS_DIR

          echo "=== javac ==="
          find $SRC -name "*.java" | sort
          javac \
            -source 8 -target 8 \
            -bootclasspath $ANDROID_JAR \
            -classpath $ANDROID_JAR \
            -d $CLASS_DIR \
            $(find $SRC -name "*.java")

          echo "=== d8 ==="
          $D8 \
            --release \
            --min-api 21 \
            --output $OUT \
            $(find $CLASS_DIR -name "*.class")

          echo "=== result ==="
          ls -lh $OUT/classes.dex
          echo "SIZE=$(wc -c < $OUT/classes.dex)" >> $GITHUB_ENV

      # ── Copy dex to Flutter assets ────────────────────────────────────────
      - name: Pack dex into assets/pkgserver.apk
        run: |
          mkdir -p assets out/apk
          # 把 classes.dex 打成只含 dex 的 zip（扩展名 .apk），CLASSPATH 可直接加载
          cp out/classes.dex out/apk/classes.dex
          cd out/apk && zip -0 ../../assets/pkgserver.apk classes.dex
          echo "Packed pkgserver.apk (${{ env.SIZE }} bytes) to assets/"

      # ── Commit back to repo ───────────────────────────────────────────────
      - name: Commit pkgserver.apk
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/pkgserver.apk

          if git diff --cached --quiet; then
            echo "pkgserver.apk unchanged, nothing to commit."
          else
            git commit -m "chore: update pkgserver.apk (${{ env.SIZE }} bytes) [skip ci]"
            git push
            echo "Committed and pushed assets/pkgserver.apk"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Also upload as artifact for manual inspection ─────────────────────
      - name: Upload dex artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkgserver-dex
          path: assets/pkgserver.apk
          retention-days: 30
